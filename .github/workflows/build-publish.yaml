name: Build and Publish Artifacts

on:
  pull_request:
  workflow_call:
    inputs:
      tag_name:
        description: 'The release tag name (e.g. v2.0.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The release tag name (e.g. v2.0.0)'
        required: true
        type: string

jobs:
  # Run tests and format check
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: make test

  # Build binaries for multiple platforms
  binary-build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [arm64, amd64]

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: |
          VERSION=${{ inputs.tag_name || github.ref_name }}
          BUILD_DATE=$(date +%Y%m%d-%H:%M:%S)
          GIT_REVISION=${GITHUB_SHA}
          GIT_BRANCH=${{ inputs.tag_name || github.ref_name }}

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-X github.com/prometheus/common/version.BuildDate=${BUILD_DATE} \
                      -X github.com/prometheus/common/version.BuildUser=github-actions \
                      -X github.com/prometheus/common/version.Branch=${GIT_BRANCH} \
                      -X github.com/prometheus/common/version.Revision=${GIT_REVISION} \
                      -X github.com/prometheus/common/version.Version=${VERSION}" \
            -o prometheus-mailgun-exporter-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: prometheus-mailgun-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ./prometheus-mailgun-exporter-${{ matrix.goos }}-${{ matrix.goarch }}

  # Upload binaries to GitHub Release
  binary-release:
    if: inputs.tag_name != ''
    needs: binary-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: prometheus-mailgun-exporter-*
          merge-multiple: true

      - name: Generate SHA256 Checksum
        run: shasum -a 256 prometheus-mailgun-exporter-* > sha256sums.txt

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            ./sha256sums.txt
            ./prometheus-mailgun-exporter-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and publish Docker image to ghcr.io
  docker-ghcr:
    needs: test
    if: inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.tag_name }}
            type=raw,value={{date 'YYYYMMDD[T]HHmmss'}}-{{sha}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to ghcr.io
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: Dockerfile
          context: .
          build-args: |
            BUILD_USER=github-actions
            GIT_BRANCH=${{ inputs.tag_name }}
            GIT_REVISION=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
